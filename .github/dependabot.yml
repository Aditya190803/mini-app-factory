version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      ai-sdk:
        patterns:
          - "ai"
          - "@ai-sdk/*"
      next:
        patterns:
          - "next"
          - "@next/*"
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      convex:
        patterns:
          - "convex"
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "ai"
          - "@ai-sdk/*"
          - "next"
          - "@next/*"
          - "convex"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
