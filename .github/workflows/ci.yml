name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build
        env:
          CONVEX_URL: https://placeholder.convex.cloud
          NEXT_PUBLIC_CONVEX_URL: https://placeholder.convex.cloud
          NEXT_PUBLIC_STACK_PROJECT_ID: placeholder
          NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY: placeholder
          STACK_SECRET_SERVER_KEY: placeholder

      - name: Test
        run: bun run test
